<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Apartmani Balent – Admin</title>
<script src="./shared.js?v=20260425-1"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/admin-login.css?v=20260426-1">
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <h1>Apartmani <span>Balent</span></h1>
    <p>Admin Panel</p>
  </div>

  <div class="login-box">
    <h2>Prijava</h2>
    <div class="error-msg" id="errorMsg">Pogrešan email ili lozinka.</div>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@apartmanibalent.hr" autocomplete="email">
    </div>
    <div class="fg">
      <label>Lozinka</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem">
      <input type="checkbox" id="zapamtiMe" checked style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer">
      <label for="zapamtiMe" style="font-size:.8rem;color:var(--muted);cursor:pointer">Zapamti me</label>
    </div>
    <button class="btn-login" id="btnLogin" onclick="login()">Prijavi se</button>
  </div>

  <div class="login-footer">
    <a href="./index.html">← Povratak na stranicu</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/admin-login.js?v=20260426-1"></script>
</body>
</html>
